name: Refresh UFC Elo ratings

on:
  schedule:
    - cron: "24 9 * * 1"
    - cron: "30 13 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Build mode"
        required: true
        default: "mvp"
        type: choice
        options:
          - mvp
          - full
      dry_run:
        description: "Validate without publishing generated site files"
        required: true
        default: false
        type: boolean
      allow_fallback:
        description: "Try UFCStats fallback when UFC-DataLab is stale"
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  issues: write

concurrency:
  group: refresh-ratings
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run validation tests
        run: python -m unittest discover -s tests

      - name: Refresh ratings
        run: |
          MODE="${{ github.event.inputs.mode || 'mvp' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          ALLOW_FALLBACK="${{ github.event.inputs.allow_fallback || 'true' }}"
          ARGS=(--mode "$MODE")
          if [ "$DRY_RUN" = "true" ]; then ARGS+=(--dry-run); fi
          if [ "$ALLOW_FALLBACK" = "true" ]; then ARGS+=(--allow-fallback); fi
          python scripts/update_data.py "${ARGS[@]}"

      - name: Commit generated data
        if: ${{ success() && github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/raw data/processed docs
          if git diff --cached --quiet; then
            echo "No generated changes."
            exit 0
          fi
          git commit -m "Refresh UFC Elo ratings"
          for attempt in 1 2 3; do
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            if git push origin "HEAD:${GITHUB_REF_NAME}"; then
              exit 0
            fi
            echo "Push attempt $attempt failed, retrying..."
            sleep 5
          done
          echo "Push failed after retries." >&2
          exit 1

      - name: Report failure via GitHub Issue
        if: ${{ failure() && github.event_name == 'schedule' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="Refresh workflow failure ($(date -u +%Y-%m-%d))"
          BODY_FILE=$(mktemp)
          {
            echo "Scheduled refresh failed."
            echo ""
            echo "- Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "- Commit: ${{ github.sha }}"
            echo "- Branch: ${{ github.ref_name }}"
            echo ""
            echo "Investigate and close this issue once resolved."
          } > "$BODY_FILE"
          EXISTING=$(gh issue list --label refresh-failure --state open --json number --jq '.[0].number' || true)
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body-file "$BODY_FILE"
          else
            gh label create refresh-failure --color B60205 --description "Refresh workflow alerts" --force || true
            gh issue create --title "$TITLE" --label refresh-failure --body-file "$BODY_FILE"
          fi
